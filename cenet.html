function getUrlVars() {
  var vars = [], hash;
  var hashes = window.location.href.slice(window.location.href.indexOf('?') + 1).split('&');
  for(var i = 0; i < hashes.length; i++) {
    hash = hashes[i].split('=');
    vars.push(hash[0]);
    vars[hash[0]] = decodeURIComponent(hash[1]);
  }
  return vars;
}
function getCookie(c_name) {
  var i,x,y,ARRcookies=document.cookie.split(";");
  for (i=0;i<ARRcookies.length;i++) {
    x=ARRcookies[i].substr(0,ARRcookies[i].indexOf("="));
    y=ARRcookies[i].substr(ARRcookies[i].indexOf("=")+1);
    x=x.replace(/^\s+|\s+$/g,"");
    if (x==c_name) {
      return unescape(y);
    }
  }
}
function setCookie(c_name,value) {
  var exdays=365;
  var exdate=new Date();
  exdate.setDate(exdate.getDate() + exdays);
  var c_value=escape(value) + ((exdays==null) ? "" : "; expires="+exdate.toUTCString());
  document.cookie=c_name+"="+c_value;
}
// Used by diocese selection page to delegate auth
function sso(dio){
  var ssoUrl = 'https://dashboard-'+dio+'.cenet.catholic.edu.au/app/okta_org2org/'+(getSsoUrl[dio]||'')+'/sso/saml';
  var orgUrl = 'https://dashboard-'+dio+'.cenet.catholic.edu.au';
  var str = decodeURIComponent(window.location.href);
  if (str.indexOf("fromURI=")>0) {
    var get = getUrlVars();
    var fromURI = get['fromURI'];
    var redirect = fromURI.replace(/^https:\/\/(?:dashboard\.cenet\.catholic\.edu\.au|cenet\.okta\.com)(.*)$/, function(match,p1,offset,string) {
      return '?RelayState='+encodeURIComponent(encodeURIComponent(p1));
    });
    document.location=ssoUrl+redirect;
  } else {
    document.location=orgUrl; // redirect to spoke dashboard
  }
}
function initSelect(){ // https://www.themaninblue.com/experiment/AccessibleSelect/
  var theSelect = document.getElementById("dioceseSelect");
  theSelect.changed = false;
  theSelect.onfocus = selectFocussed;
  theSelect.onchange = selectChanged;
  theSelect.onkeydown = selectKeyed;
  theSelect.onclick = selectClicked;
  theSelect.onmousedown = selectClicked;
  return true;
}
function selectChanged(theElement){
  var theSelect;
  if (theElement && theElement.value){
    theSelect = theElement;
  } else {
    theSelect = this;
  }
  if (!theSelect.changed) {
    return false;
  }
  theSelect.value && sso(theSelect.value);
  return true;
}
function selectClicked() {
  this.changed = true;
}
function selectFocussed(){
  this.initValue = this.value;
  return true;
}
function selectKeyed(e){
  var theEvent;
  var keyCodeTab = "9";
  var keyCodeEnter = "13";
  var keyCodeEsc = "27";	
  if (e) {
    theEvent = e;
  } else {
    theEvent = event;
  }
  if ((theEvent.keyCode == keyCodeEnter || theEvent.keyCode == keyCodeTab) && this.value != this.initValue) {
    this.changed = true;
    selectChanged(this);
  } else if (theEvent.keyCode == keyCodeEsc) {
    this.value = this.initValue;
  } else {
    this.changed = false;
  }
  return true;
} // https://www.themaninblue.com/experiment/AccessibleSelect/
function load(){
  var get = getUrlVars();
  var dio = get['diocese']||'';
  var diocese = getDio[dio]||''; // TODO: infer from fromURI?
  var orgUrl = 'https://dashboard-'+diocese+'.cenet.catholic.edu.au';
  var fromURI = get['fromURI']||orgUrl;
  var aupLink=getAUPLink[diocese]||'';
  var aupRedirect=getAUPRedirect[diocese]||orgUrl;
  if(get['aup']!==undefined){ // Session established, AUP requested
    var xmlhttp = new XMLHttpRequest();
    xmlhttp.onreadystatechange = function() {
      if (xmlhttp.readyState == XMLHttpRequest.DONE) {
        if (xmlhttp.status == 200) { // A session already exists with custom domain
          var responseJSON = JSON.parse(this.responseText);
          if (responseJSON.profile.hasOwnProperty('aupAccepted') && responseJSON.profile.aupAccepted === 'yes') {
            // continue with login flow
            document.location=fromURI;
          } else { // Alert placeholder for AUP prompt modal
            var modal = document.getElementById("aupModal");
            var aupAccept = document.getElementById("aupAccept");
            var aupPass = document.getElementById("aupPass");
            var span = document.getElementsByClassName("close")[0];
            var aup = document.getElementById("aupLink");
            aup.href=aupLink;
            modal.style.display = "block";
            span.onclick = function() {
              modal.style.display = "none";
            }
            window.onclick = function(event) {
              if (event.target == modal) {
                modal.style.display = "none";
              }
            }
            aupAccept.onclick = function() {
              var xmlhttp1 = new XMLHttpRequest();
              xmlhttp1.onreadystatechange = function() {
                if (xmlhttp1.readyState == XMLHttpRequest.DONE) {
                  if (xmlhttp1.status == 200) { // continue with login flow
                    document.location=fromURI;
                  } else { // Handle 403 and trigger re-auth with MFA
                    // Redirect to the embed URL of an MFA enabled Bookmark App with return address /signin/?aup=yes
                    document.location=aupRedirect;
                  }
                }
              };
              const jsonBody = {"profile":{"aupAccepted":"yes"}};
              xmlhttp1.open("POST", "https://dashboard-"+diocese+".cenet.catholic.edu.au/api/v1/users/me", true);
              xmlhttp1.setRequestHeader('Content-Type', 'application/json');
              xmlhttp1.withCredentials = true;
              xmlhttp1.send(JSON.stringify(jsonBody));
            }
            aupPass.onclick = function() {
              document.location=fromURI;
            }
            if (get['aup']=='yes') {
              aupAccept.onclick();
            }
          }
        }
      }
    };
    xmlhttp.open("GET", "https://dashboard-"+diocese+".cenet.catholic.edu.au/api/v1/users/me", true);
    xmlhttp.withCredentials = true;
    xmlhttp.send();
  } //else {
    if(diocese){ // If via spoke tenant, alternatively use fromURI
      var dioceseDomain = getDioceseDomain[diocese]||'';
      // check if okta.com or dashboard url used in fromURI
      var regex = /^https:\/\/[a-z-]*\.okta\.com\/.*$/
      if(regex.test(fromURI)){
        //redirect to dashboard url
        document.location=fromURI.replace(/^https:\/\/cenet-([a-z]*)\.okta\.com(.*)$/, function(match,p1,p2,offset,string) {
          return 'https://dashboard-'+p1+'.cenet.catholic.edu.au'+p2;
        });
      } else {
        // show widget (spoke) with callback to set diocese cookie and redirect to app or aup
        document.getElementById("login").classList.remove('hide');
        var oktaSignIn = new OktaSignIn({baseUrl: orgUrl, logo:dio+'.png', logoText: dio,
          transformUsername: function (username, operation) {
            return username+((username.indexOf('@')===-1)?'@'+dioceseDomain:'');
          }, features: {
            //passwordlessAuth: !document.getElementById('Ecom_Password').value,
            autoPush: true,
            rememberMe: true,
            deviceFingerprinting: false,
            selfServiceUnlock: true,
            hideSignOutLinkInMFA: true,
            showPasswordRequirementsAsHtmlList: true
          }, helpLinks: {
            custom: [
              {
                text: 'Wrong diocese?',
                href: 'https://login.cenet.catholic.edu.au?diocese'//+(fromURI?'&fromURI='+encodeURIComponent(fromURI):'') // fromURI invalid inter-tenant. TODO: spoke-hub-spoke redirect
              }
            ]
          }
        });
        oktaSignIn.renderEl(
          { el: '#okta-login-container' },
          function (res) {
            if (res.status === 'SUCCESS') {
              window.console && console.log('User %s successfully authenticated %o %o', res.user.profile.login, res.user, res.user.profile);
              setCookie('diocese',get['diocese']||''); // set diocese cookie only after successful login
              // is aup required?
              if (aupLink) {
                res.session.setCookieAndRedirect(document.location+'&aup');
              } else {
                res.session.setCookieAndRedirect(fromURI);
              }
            }
          }
        );
      }
    } else {
      // can we determine diocese by cookie or nla?
      var cookie=getCookie("diocese");
      if (dio) { // force selection if invalid (and clear cookie)
        document.cookie="diocese=; Max-Age=0; domain=cenet.catholic.edu.au; path=/";
        document.cookie="diocese=; Max-Age=0; domain=cenet.catholic.edu.au; path=/login"; // non-intended paths
        document.cookie="diocese=; Max-Age=0; domain=cenet.catholic.edu.au; path=/oauth/v1/authorize";
        document.getElementById("dioceseSelection").classList.remove('hide');
        initSelect();
      } else if (cookie!=null && cookie!="") {
        sso(getDio[cookie]||'');
      } else {
        // display diocese selection page
        document.getElementById("dioceseSelection").classList.remove('hide');
        initSelect();
        // perform NLA check
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.onreadystatechange = function() {
          if (xmlhttp.readyState == XMLHttpRequest.DONE) {
            if (xmlhttp.status == 200) { // Internal network detected

              for (var i=0, max=sdios.length; i < max; i++) {
                if (sdios[i].text==this.responseText) sso(sdios[i].value); // TODO: return diocese directly
              }
            }
          }
        };
        xmlhttp.open("GET", "https://nla.cenet.catholic.edu.au", true);
        xmlhttp.withCredentials = true;
        xmlhttp.send();
      }
    }
  //}
}
